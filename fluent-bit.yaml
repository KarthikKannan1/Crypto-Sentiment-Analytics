initContainers:
  - name: create-db-dir
    image: busybox
    command: ['sh', '-c', 'mkdir -p /var/lib/fluent-bit && chmod 755 /var/lib/fluent-bit']
    volumeMounts:
      - name: varlib
        mountPath: /var/lib/fluent-bit

daemonSetVolumes:
  - name: varlib
    hostPath:
      path: /var/lib/fluent-bit
      type: DirectoryOrCreate
  - name: varlog
    hostPath:
      path: /var/log

daemonSetVolumeMounts:
  - name: varlib
    mountPath: /var/lib/fluent-bit
  - name: varlog
    mountPath: /var/log
    readOnly: true



config:
  parsers: |
    [PARSER]
        Name        docker
        Format      json
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L
        Time_Keep   On
  
  service: |
    [SERVICE]
        HTTP_Server On
        HTTP_Listen 0.0.0.0
        HTTP_Port 2020

        storage.path /var/lib/fluent-bit/storage
        storage.sync normal
        storage.checksum off
        storage.backlog.mem_limit 20MB

  inputs: |
    [INPUT]
        Name              tail
        Tag               kube.*
        Path              /var/log/containers/*.log
        Parser            docker
        Exclude_Path      /var/log/containers/*fluent-bit*.log
        DB                /var/lib/fluent-bit/tail_docker.db
        Refresh_Interval  10
        storage.type  filesystem
        storage.pause_on_chunks_overlimit on

    [INPUT]
        Name              tail
        Tag               kube.error
        Path              /var/log/kubelet.err.log
        DB                /var/lib/fluent-bit/tail_kubelet.db
        storage.type  filesystem
        storage.pause_on_chunks_overlimit on

  filters: |
    [FILTER]
        Name        kubernetes
        Match       kube.*
        Kube_URL    https://kubernetes.default.svc.cluster.local:443

  outputs: |
    [OUTPUT]
        Name                es
        Match               *
        Host                elasticsearch-es-http.elastic.svc.cluster.local
        Port                9200
        Logstash_Format     On
        Logstash_Prefix     fluent-bit
        Retry_Limit         5
        HTTP_User           elastic
        HTTP_Passwd         elastic
        TLS                 On
        TLS.Verify          Off
        Suppress_Type_Name  On
        storage.total_limit_size 50MB
        Buffer_Size         128KB