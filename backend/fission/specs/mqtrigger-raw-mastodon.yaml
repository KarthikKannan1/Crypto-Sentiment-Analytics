apiVersion: fission.io/v1
kind: MessageQueueTrigger
metadata:
  name: raw-mastodon
spec:
  contentType: application/json
  cooldownPeriod: 300
  errorTopic: errors
  functionref:
    functionweights: null
    name: mastadon-processor
    type: name
  maxReplicaCount: 100
  maxRetries: 3
  messageQueueType: redis
  metadata:
    address: redis-headless.redis.svc.cluster.local:6379
    listLength: "100"
    listName: raw-mastodon
  minReplicaCount: 0
  mqtkind: keda
  pollingInterval: 30
  topic: raw-mastodon
