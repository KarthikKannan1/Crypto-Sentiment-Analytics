apiVersion: fission.io/v1
kind: Environment
metadata:
  name: python
spec:
  builder:
    command: build
    container:
      name: builder
      resources: {}
    image: fission/python-builder
    podspec:
      containers:
        - name: builder
          resources: {}
  imagepullsecret: ""
  keeparchive: false
  poolsize: 3
  resources: {}
  runtime:
    container:
      name: python
      resources: {}
    image: fission/python-env
    podspec:
      volumes:
        - name: parameters-volume
          configMap:
            name: parameters
      containers:
        - name: python
          env:
            - name: ES_USERNAME
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: ES_USERNAME
            - name: ES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: ES_PASSWORD
          resources: {}
          volumeMounts:
            - name: parameters-volume
              mountPath: /configs/default/parameters
              readOnly: true
  version: 3